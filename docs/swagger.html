<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>RepairFlow Swagger</title>
  <link rel="stylesheet" href="https://unpkg.com/swagger-ui-dist@5/swagger-ui.css">
  <style>
    body { margin: 0; background: #fafafa; }
  </style>
</head>
<body>
  <div id="swagger-ui"></div>
  <script src="https://unpkg.com/swagger-ui-dist@5/swagger-ui-bundle.js"></script>
  <script src="https://unpkg.com/swagger-ui-dist@5/swagger-ui-standalone-preset.js"></script>
  <script>
    async function resolveSpecUrl() {
      const candidates = ["./openapi.json", "./docs/openapi.json"];
      for (const candidate of candidates) {
        try {
          const resp = await fetch(candidate, { method: "HEAD" });
          if (resp.ok) return candidate;
        } catch (_) {}
      }
      return "./openapi.json";
    }

    resolveSpecUrl().then((specUrl) => {
      window.ui = SwaggerUIBundle({
        url: specUrl,
        dom_id: "#swagger-ui",
        deepLinking: true,
        presets: [SwaggerUIBundle.presets.apis, SwaggerUIStandalonePreset],
        layout: "BaseLayout"
      });
    });
  </script>
</body>
</html>
